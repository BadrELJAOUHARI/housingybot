name: SE watcher

on:
  schedule:
    - cron: "*/5 * * * *"   # safety net: runs every 5 min regardless
  workflow_dispatch:
    inputs:
      loop:
        description: "Internal use — leave blank"
        required: false
        default: ""

permissions:
  contents: write
  actions: write            # needed so the workflow can re-trigger itself

concurrency:
  group: se-watcher
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      # Run the scraper up to 4 times within this single job, 60s apart.
      # That gives you effective ~1-minute checks during the 5-min cron window.
      - name: Run scraper in a loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for i in 1 2 3 4; do
            echo "=== iteration $i ==="
            python scraper.py || true
            if [ $i -lt 4 ]; then sleep 60; fi
          done

      - name: Commit updated seen.json
        run: |
          if [[ -n "$(git status --porcelain seen.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "update seen.json [skip ci]"
            git push
          else
            echo "No changes to seen.json"
          fi
